name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS release
            runner: macos-15
            artifact: mradm-macos-arm64
            platform: macos
            arch: arm64
            binary: build/release/mradm
            install: brew install cmake ninja boost ccache
          - name: Linux release
            runner: ubuntu-24.04
            artifact: mradm-linux-x86_64
            platform: linux
            arch: x86_64
            binary: build/release/mradm
            install: |
              sudo apt-get update
              sudo apt-get install -y cmake ninja-build build-essential git pkg-config ccache libboost-all-dev libopenblas-dev liblapacke-dev

    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPRESS: "true"
      FC_CACHE_DIR: ${{ github.workspace }}/.fc-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: ${{ matrix.install }}

      - name: Restore FetchContent cache
        uses: actions/cache@v5
        with:
          path: .fc-cache
          key: fc-release-${{ runner.os }}-${{ hashFiles('cmake/MRDependencies.cmake', 'CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            fc-release-${{ runner.os }}-
            fc-${{ runner.os }}-

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-release-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-release-
            ccache-${{ runner.os }}-

      - name: Configure
        run: >
          cmake --preset release
          -DFETCHCONTENT_BASE_DIR="$FC_CACHE_DIR"
          -DCMAKE_DISABLE_FIND_PACKAGE_fmt=TRUE
          -DCMAKE_DISABLE_FIND_PACKAGE_spdlog=TRUE
          -DCMAKE_DISABLE_FIND_PACKAGE_CLI11=TRUE
          -DMR_ADM_FLAC_PROVIDER=VENDORED
          -DMR_ADM_OPUS_PROVIDER=VENDORED
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build --preset release --target mradm_exe

      - name: Smoke
        run: |
          "${{ matrix.binary }}" --version
          "${{ matrix.binary }}" backends

      - name: Package
        run: >
          scripts/release/package.sh
          --binary "${{ matrix.binary }}"
          --platform "${{ matrix.platform }}"
          --arch "${{ matrix.arch }}"
          --cmake-options "release; fmt/spdlog/CLI11 FetchContent; MR_ADM_FLAC_PROVIDER=VENDORED; MR_ADM_OPUS_PROVIDER=VENDORED"

      - name: Package smoke
        run: |
          archive="$(ls dist/mradm-*-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz)"
          scripts/release/smoke-package.sh "$archive"

      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/mradm-*-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
            dist/mradm-*-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz.sha256
          if-no-files-found: error

      - name: ccache stats
        if: always()
        run: ccache --show-stats || true
