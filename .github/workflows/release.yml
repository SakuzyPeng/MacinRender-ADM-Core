name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS release
            runner: macos-26
            artifact: mradm-macos-arm64
            platform: macos
            arch: arm64
            binary: build/release/mradm
            install: brew install cmake ninja boost ccache

    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPRESS: "true"
      FC_CACHE_DIR: ${{ github.workspace }}/.fc-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: ${{ matrix.install }}

      - name: Restore FetchContent cache
        uses: actions/cache@v5
        with:
          path: .fc-cache
          key: fc-${{ runner.os }}-${{ hashFiles('cmake/MRDependencies.cmake', 'CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            fc-${{ runner.os }}-

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-release-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-release-
            ccache-${{ runner.os }}-

      - name: Configure
        run: >
          cmake --preset release
          -DFETCHCONTENT_BASE_DIR="$FC_CACHE_DIR"
          -DCMAKE_DISABLE_FIND_PACKAGE_fmt=TRUE
          -DCMAKE_DISABLE_FIND_PACKAGE_spdlog=TRUE
          -DCMAKE_DISABLE_FIND_PACKAGE_CLI11=TRUE
          -DMR_ADM_FLAC_PROVIDER=VENDORED
          -DMR_ADM_OPUS_PROVIDER=VENDORED
          -DMR_ADM_ENABLE_IAMF=OFF
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build --preset release --target mradm_exe

      - name: Smoke
        run: |
          "${{ matrix.binary }}" --version
          "${{ matrix.binary }}" backends

      - name: Package
        run: >
          scripts/release/package.sh
          --binary "${{ matrix.binary }}"
          --platform "${{ matrix.platform }}"
          --arch "${{ matrix.arch }}"
          --cmake-options "release; fmt/spdlog/CLI11 FetchContent; MR_ADM_FLAC_PROVIDER=VENDORED; MR_ADM_OPUS_PROVIDER=VENDORED; MR_ADM_ENABLE_IAMF=OFF"

      - name: Package smoke
        run: |
          archive="$(ls dist/mradm-*-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz)"
          scripts/release/smoke-package.sh "$archive"

      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/mradm-*-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
            dist/mradm-*-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz.sha256
          if-no-files-found: error

      - name: ccache stats
        if: always()
        run: ccache --show-stats || true

  release-linux-appimage:
    name: Linux AppImage release
    runs-on: ubuntu-24.04

    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPRESS: "true"
      FC_CACHE_DIR: ${{ github.workspace }}/.fc-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential git pkg-config ccache curl file patchelf desktop-file-utils libboost-all-dev libopenblas-dev liblapacke-dev
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2

      - name: Restore FetchContent cache
        uses: actions/cache@v5
        with:
          path: .fc-cache
          key: fc-${{ runner.os }}-${{ hashFiles('cmake/MRDependencies.cmake', 'CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            fc-${{ runner.os }}-

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-release-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-release-
            ccache-${{ runner.os }}-

      - name: Configure
        run: >
          cmake --preset release
          -DFETCHCONTENT_BASE_DIR="$FC_CACHE_DIR"
          -DCMAKE_DISABLE_FIND_PACKAGE_fmt=TRUE
          -DCMAKE_DISABLE_FIND_PACKAGE_spdlog=TRUE
          -DCMAKE_DISABLE_FIND_PACKAGE_CLI11=TRUE
          -DMR_ADM_FLAC_PROVIDER=VENDORED
          -DMR_ADM_OPUS_PROVIDER=VENDORED
          -DMR_ADM_ENABLE_IAMF=OFF
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build --preset release --target mradm_exe

      - name: Smoke
        run: |
          build/release/mradm --version
          build/release/mradm backends

      - name: Package AppImage
        run: >
          scripts/release/package-linux-appimage.sh
          --binary build/release/mradm
          --arch x86_64

      - name: AppImage smoke
        run: |
          appimage="$(ls dist/mradm-*-linux-x86_64.AppImage)"
          scripts/release/smoke-linux-appimage.sh "$appimage"

      - name: Upload AppImage release package
        uses: actions/upload-artifact@v7
        with:
          name: mradm-linux-x86_64-AppImage
          path: |
            dist/mradm-*-linux-x86_64.AppImage
            dist/mradm-*-linux-x86_64.AppImage.sha256
          if-no-files-found: error

      - name: ccache stats
        if: always()
        run: ccache --show-stats || true

  release-windows:
    name: Windows release
    runs-on: windows-2025

    env:
      FC_CACHE_DIR: ${{ github.workspace }}\.fc-cache
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\.vcpkg-bincache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}\.vcpkg-bincache,readwrite
      VCPKG_FEATURE_FLAGS: binarycaching
      OPENBLAS_VERSION: 0.3.33
      OPENBLAS_ROOT: ${{ github.workspace }}\.openblas

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore FetchContent cache
        uses: actions/cache@v5
        with:
          path: .fc-cache
          key: fc-windows-${{ hashFiles('cmake/MRDependencies.cmake', 'CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            fc-windows-

      - name: Restore vcpkg binary cache
        uses: actions/cache@v5
        with:
          path: .vcpkg-bincache
          key: vcpkg-release-windows-boost-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: |
            vcpkg-release-windows-boost-
            vcpkg-windows-boost-

      - name: Restore OpenBLAS cache
        uses: actions/cache@v5
        with:
          path: .openblas
          key: openblas-windows-x64-${{ env.OPENBLAS_VERSION }}

      - name: Install native dependencies
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:VCPKG_DEFAULT_BINARY_CACHE" | Out-Null
          Write-Host "VCPKG_BINARY_SOURCES=$env:VCPKG_BINARY_SOURCES"
          vcpkg install `
            boost-format `
            boost-functional `
            boost-algorithm `
            boost-integer `
            boost-iterator `
            boost-math `
            boost-optional `
            boost-range `
            boost-rational `
            boost-smart-ptr `
            boost-variant `
            --triplet x64-windows

      - name: Install prebuilt OpenBLAS
        shell: pwsh
        run: |
          $lib = Join-Path $env:OPENBLAS_ROOT "lib\libopenblas.lib"
          if (!(Test-Path $lib)) {
            New-Item -ItemType Directory -Force -Path "$env:OPENBLAS_ROOT" | Out-Null
            $zip = Join-Path $env:RUNNER_TEMP "OpenBLAS-$env:OPENBLAS_VERSION-x64.zip"
            $url = "https://github.com/OpenMathLib/OpenBLAS/releases/download/v$env:OPENBLAS_VERSION/OpenBLAS-$env:OPENBLAS_VERSION-x64.zip"
            Invoke-WebRequest -Uri $url -OutFile $zip
            Expand-Archive -Path $zip -DestinationPath "$env:OPENBLAS_ROOT" -Force
          }
          "OPENBLAS_LIBRARY=$lib" | Out-File -FilePath $env:GITHUB_ENV -Append
          "LAPACKE_LIBRARY=$lib" | Out-File -FilePath $env:GITHUB_ENV -Append
          "OPENBLAS_HEADER_PATH=$(Join-Path $env:OPENBLAS_ROOT 'include')" | Out-File -FilePath $env:GITHUB_ENV -Append
          "LAPACKE_HEADER_PATH=$(Join-Path $env:OPENBLAS_ROOT 'include')" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$(Join-Path $env:OPENBLAS_ROOT 'bin')" | Out-File -FilePath $env:GITHUB_PATH -Append
          Write-Host "Using prebuilt OpenBLAS: $lib"

      - name: Locate MSVC environment
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if ([string]::IsNullOrWhiteSpace($installPath)) {
            throw "Visual Studio with VC tools was not found"
          }
          $vcvars = Join-Path $installPath "VC\Auxiliary\Build\vcvars64.bat"
          if (!(Test-Path $vcvars)) {
            throw "vcvars64.bat not found at $vcvars"
          }
          "VCVARS64=$vcvars" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Using MSVC environment: $vcvars"

      - name: Configure
        shell: cmd
        run: |
          call "%VCVARS64%"
          cmake -S . -B build/windows -G Ninja ^
            -DCMAKE_BUILD_TYPE=MinSizeRel ^
            -DCMAKE_C_COMPILER=cl ^
            -DCMAKE_CXX_COMPILER=cl ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_INSTALLATION_ROOT%\scripts\buildsystems\vcpkg.cmake" ^
            -DFETCHCONTENT_BASE_DIR="%FC_CACHE_DIR%" ^
            -DMR_ADM_CORE_BUILD_TESTS=OFF ^
            -DMR_ADM_FLAC_PROVIDER=VENDORED ^
            -DMR_ADM_OPUS_PROVIDER=VENDORED ^
            -DMR_ADM_ENABLE_IAMF=OFF ^
            -DSAF_PERFORMANCE_LIB=SAF_USE_OPEN_BLAS_AND_LAPACKE ^
            -DOPENBLAS_LIBRARY="%OPENBLAS_LIBRARY%" ^
            -DLAPACKE_LIBRARY="%LAPACKE_LIBRARY%" ^
            -DOPENBLAS_HEADER_PATH="%OPENBLAS_HEADER_PATH%" ^
            -DLAPACKE_HEADER_PATH="%LAPACKE_HEADER_PATH%"

      - name: Build
        shell: cmd
        run: |
          call "%VCVARS64%"
          cmake --build build/windows --target mradm_exe --config RelWithDebInfo

      - name: Smoke
        shell: pwsh
        run: |
          .\build\windows\mradm.exe --version
          .\build\windows\mradm.exe backends

      - name: Package
        shell: pwsh
        run: >
          .\scripts\release\package-windows.ps1
          -Binary ".\build\windows\mradm.exe"
          -Arch "x64"
          -OpenBlasRoot "$env:OPENBLAS_ROOT"
          -VcpkgRoot "$env:VCPKG_INSTALLATION_ROOT"
          -CmakeOptions "MinSizeRel; MR_ADM_FLAC_PROVIDER=VENDORED; MR_ADM_OPUS_PROVIDER=VENDORED; MR_ADM_ENABLE_IAMF=OFF; SAF_PERFORMANCE_LIB=SAF_USE_OPEN_BLAS_AND_LAPACKE"

      - name: Package smoke
        shell: pwsh
        run: |
          $archive = Get-ChildItem -Path dist -Filter "mradm-*-windows-x64.zip" | Select-Object -First 1
          if ($null -eq $archive) { throw "Windows release package was not produced" }
          .\scripts\release\smoke-package-windows.ps1 -Archive $archive.FullName

      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: mradm-windows-x64
          path: |
            dist/mradm-*-windows-x64.zip
            dist/mradm-*-windows-x64.zip.sha256
          if-no-files-found: error

  release-gui-macos:
    name: macOS GUI release
    runs-on: macos-26

    env:
      FC_CACHE_DIR: ${{ github.workspace }}/.fc-cache
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install native dependencies
        run: brew install cmake ninja boost

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore FetchContent cache
        uses: actions/cache@v5
        with:
          path: .fc-cache
          key: fc-gui-macos-${{ hashFiles('cmake/MRDependencies.cmake', 'CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            fc-gui-macos-
            fc-${{ runner.os }}-

      - name: Package GUI
        run: scripts/release/package-gui.sh --rid osx-arm64

      - name: Package smoke
        run: |
          archive="$(ls dist/MacinRender-Gui-*-macos-arm64.tar.gz)"
          scripts/release/smoke-gui-package.sh "$archive"

      - name: Upload GUI release package
        uses: actions/upload-artifact@v7
        with:
          name: MacinRender-Gui-macos-arm64
          path: |
            dist/MacinRender-Gui-*-macos-arm64.tar.gz
            dist/MacinRender-Gui-*-macos-arm64.tar.gz.sha256
          if-no-files-found: error

  release-gui-windows:
    name: Windows GUI release
    runs-on: windows-2025

    env:
      FC_CACHE_DIR: ${{ github.workspace }}\.fc-cache
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\.vcpkg-bincache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}\.vcpkg-bincache,readwrite
      VCPKG_FEATURE_FLAGS: binarycaching
      OPENBLAS_VERSION: 0.3.33
      OPENBLAS_ROOT: ${{ github.workspace }}\.openblas
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore FetchContent cache
        uses: actions/cache@v5
        with:
          path: .fc-cache
          key: fc-gui-windows-${{ hashFiles('cmake/MRDependencies.cmake', 'CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            fc-gui-windows-
            fc-windows-

      - name: Restore vcpkg binary cache
        uses: actions/cache@v5
        with:
          path: .vcpkg-bincache
          key: vcpkg-gui-release-windows-boost-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: |
            vcpkg-gui-release-windows-boost-
            vcpkg-release-windows-boost-
            vcpkg-windows-boost-

      - name: Restore OpenBLAS cache
        uses: actions/cache@v5
        with:
          path: .openblas
          key: openblas-windows-x64-${{ env.OPENBLAS_VERSION }}

      - name: Install native dependencies
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:VCPKG_DEFAULT_BINARY_CACHE" | Out-Null
          Write-Host "VCPKG_BINARY_SOURCES=$env:VCPKG_BINARY_SOURCES"
          vcpkg install `
            boost-format `
            boost-functional `
            boost-algorithm `
            boost-integer `
            boost-iterator `
            boost-math `
            boost-optional `
            boost-range `
            boost-rational `
            boost-smart-ptr `
            boost-variant `
            --triplet x64-windows

      - name: Install prebuilt OpenBLAS
        shell: pwsh
        run: |
          $lib = Join-Path $env:OPENBLAS_ROOT "lib\libopenblas.lib"
          if (!(Test-Path $lib)) {
            New-Item -ItemType Directory -Force -Path "$env:OPENBLAS_ROOT" | Out-Null
            $zip = Join-Path $env:RUNNER_TEMP "OpenBLAS-$env:OPENBLAS_VERSION-x64.zip"
            $url = "https://github.com/OpenMathLib/OpenBLAS/releases/download/v$env:OPENBLAS_VERSION/OpenBLAS-$env:OPENBLAS_VERSION-x64.zip"
            Invoke-WebRequest -Uri $url -OutFile $zip
            Expand-Archive -Path $zip -DestinationPath "$env:OPENBLAS_ROOT" -Force
          }
          "OPENBLAS_LIBRARY=$lib" | Out-File -FilePath $env:GITHUB_ENV -Append
          "LAPACKE_LIBRARY=$lib" | Out-File -FilePath $env:GITHUB_ENV -Append
          "OPENBLAS_HEADER_PATH=$(Join-Path $env:OPENBLAS_ROOT 'include')" | Out-File -FilePath $env:GITHUB_ENV -Append
          "LAPACKE_HEADER_PATH=$(Join-Path $env:OPENBLAS_ROOT 'include')" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$(Join-Path $env:OPENBLAS_ROOT 'bin')" | Out-File -FilePath $env:GITHUB_PATH -Append
          Write-Host "Using prebuilt OpenBLAS: $lib"

      - name: Locate MSVC environment
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if ([string]::IsNullOrWhiteSpace($installPath)) {
            throw "Visual Studio with VC tools was not found"
          }
          $vcvars = Join-Path $installPath "VC\Auxiliary\Build\vcvars64.bat"
          if (!(Test-Path $vcvars)) {
            throw "vcvars64.bat not found at $vcvars"
          }
          "VCVARS64=$vcvars" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Using MSVC environment: $vcvars"

      - name: Package GUI
        shell: pwsh
        run: >
          .\scripts\release\package-gui-windows.ps1
          -Rid "win-x64"
          -OpenBlasRoot "$env:OPENBLAS_ROOT"
          -VcpkgRoot "$env:VCPKG_INSTALLATION_ROOT"
          -CmakeOptions "MinSizeRel; MR_ADM_BUILD_CAPI_BUNDLE=ON; MR_ADM_FLAC_PROVIDER=VENDORED; MR_ADM_OPUS_PROVIDER=VENDORED; MR_ADM_ENABLE_IAMF=OFF; SAF_PERFORMANCE_LIB=SAF_USE_OPEN_BLAS_AND_LAPACKE"

      - name: Package smoke
        shell: pwsh
        run: |
          $archive = Get-ChildItem -Path dist -Filter "MacinRender-Gui-*-windows-x64.zip" | Select-Object -First 1
          if ($null -eq $archive) { throw "Windows GUI release package was not produced" }
          .\scripts\release\smoke-gui-package-windows.ps1 -Archive $archive.FullName

      - name: Upload GUI release package
        uses: actions/upload-artifact@v7
        with:
          name: MacinRender-Gui-windows-x64
          path: |
            dist/MacinRender-Gui-*-windows-x64.zip
            dist/MacinRender-Gui-*-windows-x64.zip.sha256
          if-no-files-found: error

  publish-github-release:
    name: Publish GitHub release
    runs-on: ubuntu-24.04
    needs:
      - release
      - release-linux-appimage
      - release-windows
      - release-gui-macos
      - release-gui-windows
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          shopt -s globstar nullglob
          assets=()
          for asset in release-assets/**/*; do
            [[ -f "$asset" ]] && assets+=("$asset")
          done
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "no release assets were downloaded" >&2
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${assets[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${assets[@]}" \
              --title "$TAG_NAME" \
              --notes "Automated release for $TAG_NAME."
          fi
