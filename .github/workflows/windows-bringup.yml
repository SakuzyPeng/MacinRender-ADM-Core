name: Windows Bring-up

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: windows-bringup-${{ github.ref }}
  cancel-in-progress: true

jobs:
  msvc:
    name: Windows MSVC CLI
    runs-on: windows-2025

    env:
      FC_CACHE_DIR: ${{ github.workspace }}\.fc-cache
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\.vcpkg-bincache
      VCPKG_BINARY_SOURCES: clear;x-gha,readwrite;files,${{ github.workspace }}\.vcpkg-bincache,readwrite
      VCPKG_FEATURE_FLAGS: binarycaching

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore FetchContent cache
        uses: actions/cache@v5
        with:
          path: .fc-cache
          key: fc-windows-${{ hashFiles('cmake/MRDependencies.cmake', 'CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            fc-windows-

      - name: Restore vcpkg binary cache
        uses: actions/cache@v5
        with:
          path: .vcpkg-bincache
          key: vcpkg-windows-openblas-${{ runner.os }}-${{ hashFiles('.github/workflows/windows-bringup.yml') }}
          restore-keys: |
            vcpkg-windows-openblas-${{ runner.os }}-
            vcpkg-windows-openblas-

      - name: Install native dependencies
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:VCPKG_DEFAULT_BINARY_CACHE" | Out-Null
          Write-Host "VCPKG_BINARY_SOURCES=$env:VCPKG_BINARY_SOURCES"
          vcpkg install boost-headers openblas --triplet x64-windows

      - name: Locate MSVC environment
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if ([string]::IsNullOrWhiteSpace($installPath)) {
            throw "Visual Studio with VC tools was not found"
          }
          $vcvars = Join-Path $installPath "VC\Auxiliary\Build\vcvars64.bat"
          if (!(Test-Path $vcvars)) {
            throw "vcvars64.bat not found at $vcvars"
          }
          "VCVARS64=$vcvars" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Using MSVC environment: $vcvars"

      - name: Locate OpenBLAS for SAF
        shell: pwsh
        run: |
          $prefix = Join-Path $env:VCPKG_INSTALLATION_ROOT "installed\x64-windows"
          $include = Join-Path $prefix "include"
          $libDir = Join-Path $prefix "lib"
          $openblas = Get-ChildItem $libDir -Filter "*openblas*.lib" | Select-Object -First 1
          if ($null -eq $openblas) {
            throw "openblas .lib not found in $libDir"
          }
          "OPENBLAS_LIBRARY=$($openblas.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "LAPACKE_LIBRARY=$($openblas.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "OPENBLAS_HEADER_PATH=$include" | Out-File -FilePath $env:GITHUB_ENV -Append
          "LAPACKE_HEADER_PATH=$include" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Using OpenBLAS library: $($openblas.FullName)"
          Write-Host "Using OpenBLAS include: $include"

      - name: Configure
        shell: cmd
        run: |
          call "%VCVARS64%"
          cmake -S . -B build/windows -G Ninja ^
            -DCMAKE_BUILD_TYPE=RelWithDebInfo ^
            -DCMAKE_C_COMPILER=cl ^
            -DCMAKE_CXX_COMPILER=cl ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_INSTALLATION_ROOT%\scripts\buildsystems\vcpkg.cmake" ^
            -DFETCHCONTENT_BASE_DIR="%FC_CACHE_DIR%" ^
            -DMR_ADM_CORE_BUILD_TESTS=OFF ^
            -DMR_ADM_FLAC_PROVIDER=VENDORED ^
            -DMR_ADM_OPUS_PROVIDER=VENDORED ^
            -DSAF_PERFORMANCE_LIB=SAF_USE_OPEN_BLAS_AND_LAPACKE ^
            -DOPENBLAS_LIBRARY="%OPENBLAS_LIBRARY%" ^
            -DLAPACKE_LIBRARY="%LAPACKE_LIBRARY%" ^
            -DOPENBLAS_HEADER_PATH="%OPENBLAS_HEADER_PATH%" ^
            -DLAPACKE_HEADER_PATH="%LAPACKE_HEADER_PATH%"

      - name: Build CLI
        shell: cmd
        run: |
          call "%VCVARS64%"
          cmake --build build/windows --target mradm_exe --config RelWithDebInfo

      - name: Smoke
        shell: pwsh
        run: |
          .\build\windows\mradm.exe --version
          .\build\windows\mradm.exe backends
